<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>投骰子0.0.27</title><style>*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Microsoft YaHei',Arial,sans-serif;background:var(--bg);color:var(--text);--bg:linear-gradient(135deg,#eef4ff,#fff);--panel:#ffffffee;--text:#172033;--muted:#64748b;--line:#dbe4f0;--p:#e84a6a;--p2:#ff7a9a;--stage:#edf4ff}.cartoon{--bg:linear-gradient(135deg,#fff1b8,#ffd7ec);--panel:#fffdf0ee;--text:#5b3215;--muted:#8a5b31;--line:#ffc46b;--p:#ff8a00;--p2:#ff5aa5;--stage:#fff0cf}.minimal{--bg:#f1f1f1;--panel:#fff;--text:#111;--muted:#555;--line:#d6d6d6;--p:#111;--p2:#444;--stage:#f8f8f8}.ios{--bg:linear-gradient(180deg,#f5f5f7,#e9eef8);--panel:#ffffffcc;--text:#111827;--muted:#6b7280;--line:#3c3c432e;--p:#007aff;--p2:#5ac8fa;--stage:#eef5ff}.top{text-align:center;padding:14px;background:var(--panel);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5;backdrop-filter:blur(14px)}h1{margin:0;font-size:26px}.meta{display:flex;justify-content:center;gap:16px;flex-wrap:wrap;margin-top:6px;font-size:12px;color:var(--muted)}.topTools{position:absolute;right:16px;top:14px;display:flex;align-items:center;gap:8px}.styleSwitch{display:flex;gap:4px;border:1px solid var(--line);background:white;border-radius:999px;padding:4px}.styleBtn{border:0;background:transparent;color:var(--muted);border-radius:999px;padding:7px 9px;font-size:13px;font-weight:800;cursor:pointer}.styleBtn.on{background:linear-gradient(135deg,var(--p),var(--p2));color:white}.history{border:0;border-radius:99px;background:var(--text);color:white;padding:10px 15px;font-weight:800}.wrap{display:grid;grid-template-columns:350px 1fr;min-height:calc(100vh - 130px)}.panel{background:var(--panel);border-right:1px solid var(--line);padding:16px}.guide{background:white;border:1px solid var(--line);border-radius:22px;padding:14px;margin-bottom:14px;line-height:1.6}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.field{margin:13px 0}.field label{display:flex;justify-content:space-between;color:var(--muted);font-size:13px;margin-bottom:8px}input{width:100%;height:46px;border:1px solid var(--line);border-radius:16px;padding:0 12px;font-size:16px}.primary{width:100%;border:0;border-radius:18px;background:linear-gradient(135deg,var(--p),var(--p2));color:white;padding:14px;font-size:16px;font-weight:900;margin-top:10px}.stats{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:12px}.stat{background:white;border:1px solid var(--line);border-radius:18px;padding:11px}.stat small{color:var(--muted)}.stat strong{display:block;font-size:23px}.stage{height:var(--h,560px);min-height:360px;position:relative;background:var(--stage);overflow:hidden}canvas{width:100%;height:100%;display:block}.tagbar{position:absolute;left:14px;right:14px;top:14px;display:flex;justify-content:space-between;pointer-events:none}.tag,.pill{border-radius:99px;padding:8px 12px;font-size:13px;background:#ffffffcc;border:1px solid var(--line)}.pills{position:absolute;left:14px;right:14px;bottom:14px;display:flex;justify-content:space-between}.pill{background:#172033cc;color:white;border:0}.foot{text-align:center;padding:10px;color:var(--muted);font-size:12px;border-top:1px solid var(--line);background:var(--panel)}.modal{position:fixed;inset:0;background:#0f172aaa;display:flex;align-items:center;justify-content:center;padding:18px;z-index:10}.hide{display:none!important}.card{background:white;color:#172033;border-radius:28px;max-width:720px;width:94vw;text-align:center;padding:24px}.box,.hist{text-align:left;max-height:54vh;overflow:auto;border:1px solid var(--line);border-radius:16px;padding:12px;line-height:1.75}.line{border-bottom:1px dashed var(--line);padding:7px 0}.total{font-size:20px;font-weight:900;color:var(--p);margin:8px}.burst{position:fixed;font-size:32px;animation:up 1.8s ease-out forwards;z-index:12}@keyframes up{from{transform:translateY(25px) scale(.5);opacity:0}20%{opacity:1}to{transform:translateY(-140px) scale(1.8) rotate(240deg);opacity:0}}@media(max-width:860px){.topTools{position:static;margin-top:10px;justify-content:center;flex-wrap:wrap}.wrap{display:block}.panel{border-right:0}.row{grid-template-columns:1fr}.stage{height:var(--hm,54vh)}} </style></head><body><header class="top"><h1>🎲 投骰子</h1><div class="meta"><span>🔖 版本0.0.27</span><span>🕒 更新时间：2026年4月29日</span></div><div class="topTools"><div class="styleSwitch"><button class="styleBtn on" data-t="">标准</button><button class="styleBtn" data-t="cartoon">卡通</button><button class="styleBtn" data-t="minimal">极简</button><button class="styleBtn" data-t="ios">iOS</button></div><button id="histBtn" class="history">📋 历史记录</button></div></header><main class="wrap"><aside class="panel"><div class="guide"><b>🧭 下一步：设置投掷参数</b><br>右上角切换风格；结果会显示每一次投掷明细。</div><div class="row"><div class="field"><label>🎲 骰子数量<em>1-99</em></label><input id="num" type="number" min="1" max="99" value="3" list="nums"></div><div class="field"><label>🔁 投掷次数<em>1-99</em></label><input id="times" type="number" min="1" max="99" value="2" list="nums"></div></div><datalist id="nums"></datalist><button id="roll" class="primary">▶️ 开始投掷</button><div class="stats"><div class="stat"><small>🎲 当前骰子</small><strong id="sn">3</strong></div><div class="stat"><small>🔁 投掷次数</small><strong id="st">2</strong></div></div></aside><section id="stage" class="stage"><div class="tagbar"><span class="tag">🎲 骰子滚动区</span><span class="tag">📋 右上角可查历史</span></div><canvas id="cv"></canvas><div class="pills"><span id="state" class="pill">⏳ 等待投掷</span><span id="result" class="pill">📊 暂无结果</span></div></section></main><footer class="foot">👤 制作人：王亮　　✉️ 联系方式：wlnet@163.com</footer><div id="resM" class="modal hide"><div class="card"><h2>🎯 投掷完成</h2><div id="resTotal" class="total"></div><div id="res" class="box"></div><button id="blessBtn" class="primary">💖 查看祝福</button></div></div><div id="blessM" class="modal hide"><div class="card"><div id="bless" class="total"></div><button id="ok" class="primary">✅ 收到祝福，继续好运</button></div></div><div id="histM" class="modal hide"><div class="card"><h2>📋 最近50次投掷结果</h2><div id="hist" class="hist"></div><button id="close" class="primary">✖️ 关闭</button></div></div><script>(()=>{const $=id=>document.getElementById(id),cv=$('cv'),ctx=cv.getContext('2d'),stage=$('stage'),num=$('num'),times=$('times'),sn=$('sn'),st=$('st'),state=$('state'),result=$('result');let W=0,H=0,dice=[],rolling=false,locked=false,end=0,raf=0,lastShake=0,cur=null;for(let i=1;i<100;i++){let o=document.createElement('option');o.value=i;$('nums').appendChild(o)}const clamp=v=>Math.max(1,Math.min(99,parseInt(v)||1));function info(n,w){let cols=n<=8?n:Math.min(n,Math.max(1,Math.floor((w-36)/42),Math.ceil(Math.sqrt(n*w/520))));let rows=Math.ceil(n/cols);let base=(w-48-(cols-1)*14)/cols;let s=Math.floor(Math.max(28,Math.min(n==1?52:56,base)));if(n<=4)s=Math.max(44,Math.min(52,s));let gx=Math.max(14,Math.min(28,(w-48-cols*s)/Math.max(1,cols-1||1)));return{cols,rows,s,gx,gy:Math.max(s+12,Math.min(76,s+22))}}function adjust(){let n=clamp(num.value),li=info(n,stage.clientWidth||innerWidth),need=132+li.rows*li.gy+90,max=innerWidth<861?innerHeight*.74:Math.max(500,innerHeight-96),min=innerWidth<861?330:420,h=Math.max(min,Math.min(max,need));stage.style.setProperty('--h',h+'px');stage.style.setProperty('--hm',h+'px')}function resize(){adjust();let d=Math.min(devicePixelRatio||1,1.75),r=cv.getBoundingClientRect();W=Math.max(300,r.width);H=Math.max(300,r.height);cv.width=W*d;cv.height=H*d;ctx.setTransform(d,0,0,d,0,0);if(!rolling){make(clamp(num.value));draw()}}addEventListener('resize',resize);function make(n){dice=[];let li=info(n,W),gw=li.cols*li.s+(li.cols-1)*li.gx,sx=W/2-gw/2+li.s/2,sy=Math.max(72,Math.min(96,H*.18));for(let i=0;i<n;i++){let c=i%li.cols,r=Math.floor(i/li.cols);dice.push({x:sx+c*(li.s+li.gx),y:sy+r*li.gy,s:li.s,rot:0,vx:0,vy:0,vr:0,val:i%6+1,lift:0,tilt:0})}}function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath()}function pips(v,s){let a=s*.22,m={1:[[0,0]],2:[[-a,-a],[a,a]],3:[[-a,-a],[0,0],[a,a]],4:[[-a,-a],[a,-a],[-a,a],[a,a]],5:[[-a,-a],[a,-a],[0,0],[-a,a],[a,a]],6:[[-a,-a],[a,-a],[-a,0],[a,0],[-a,a],[a,a]]};m[v].forEach(p=>{ctx.fillStyle='#111';ctx.beginPath();ctx.arc(p[0],p[1],s*.072,0,7);ctx.fill()})}function one(d){let s=d.s;ctx.save();ctx.translate(d.x,d.y-d.lift);ctx.rotate(d.rot);ctx.transform(1,d.tilt*.045,d.tilt*.025,1,0,0);rr(-s/2,-s/2,s,s,s*.2);let g=ctx.createLinearGradient(-s/2,-s/2,s/2,s/2);g.addColorStop(0,'#fff');g.addColorStop(1,'#cbd5e1');ctx.fillStyle=g;ctx.fill();ctx.strokeStyle='#52607077';ctx.lineWidth=2;rr(-s/2,-s/2,s,s,s*.2);ctx.stroke();pips(d.val,s);ctx.restore()}function draw(){ctx.clearRect(0,0,W,H);dice.forEach(one)}function sync(){num.value=clamp(num.value);times.value=clamp(times.value);sn.textContent=num.value;st.textContent=times.value;resize()}num.oninput=()=>{sn.textContent=clamp(num.value);resize()};times.oninput=()=>st.textContent=clamp(times.value);num.onchange=sync;times.onchange=sync;function rollDetails(n,t){return Array.from({length:t},(_,i)=>{let values=Array.from({length:n},()=>1+(Math.random()*6|0));return{index:i+1,values,sum:values.reduce((a,b)=>a+b,0)}})}function detailsHtml(rolls){return rolls.map(r=>'<div class="line"><b>第'+r.index+'次</b>：['+r.values.join('、')+']　小计：<b>'+r.sum+'</b>点</div>').join('')}function compact(record){return '<div class="line"><b>'+record.time+'</b><br>🎲 '+record.n+'个 × 🔁 '+record.t+'次｜总计：<b>'+record.total+'</b>点<br>'+detailsHtml(record.rolls)+'</div>'}function save(record){let list=JSON.parse(localStorage.diceHistory0027||'[]');list.unshift(record);try{localStorage.diceHistory0027=JSON.stringify(list.slice(0,50))}catch(e){localStorage.diceHistory0027=JSON.stringify(list.slice(0,10))}}function roll(){if(rolling||locked)return;sync();let n=clamp(num.value),t=clamp(times.value);make(n);rolling=true;locked=true;cur={n,t,rolls:rollDetails(n,t)};end=performance.now()+Math.min(5000,1800+n*18+t*8);$('roll').disabled=true;$('roll').textContent='⏳ 投掷中，请稍候';state.textContent='🎲 投掷中';result.textContent=n+'个 × '+t+'次';dice.forEach(d=>{d.vx=(Math.random()-.5)*16;d.vy=(Math.random()-.1)*12;d.vr=(Math.random()-.5)*.92});cancelAnimationFrame(raf);raf=requestAnimationFrame(loop)}function loop(now){let r=end-now;dice.forEach(d=>{d.x+=d.vx;d.y+=d.vy;d.vx*=.983;d.vy*=.985;d.rot+=d.vr;d.vr*=.987;d.lift=Math.abs(Math.sin(now/78+d.x*.018))*Math.min(24,Math.max(0,r)/65);d.tilt=Math.sin(now/128+d.y*.012)*Math.min(1.18,Math.max(0,r)/900);if(d.x<d.s/2||d.x>W-d.s/2)d.vx*=-.84;if(d.y<d.s/2||d.y>H-d.s/2)d.vy*=-.84;d.x=Math.max(d.s/2,Math.min(W-d.s/2,d.x));d.y=Math.max(d.s/2,Math.min(H-d.s/2,d.y));if(Math.random()<.42)d.val=1+(Math.random()*6|0)});draw();r>0?raf=requestAnimationFrame(loop):finish()}function finish(){rolling=false;let last=cur.rolls[cur.rolls.length-1];dice.forEach((d,i)=>{d.rot=0;d.lift=0;d.tilt=0;d.val=last.values[i]||1});cur.total=cur.rolls.reduce((a,r)=>a+r.sum,0);cur.time=new Date().toLocaleString();draw();state.textContent='✅ 投掷完成';result.textContent=cur.total+'点';$('resTotal').textContent='📊 总计：'+cur.total+'点';$('res').innerHTML=detailsHtml(cur.rolls);save(cur);$('resM').classList.remove('hide')}function hist(){let list=JSON.parse(localStorage.diceHistory0027||'[]');$('hist').innerHTML=list.length?list.map(compact).join(''):'暂无历史记录';$('histM').classList.remove('hide')}function fire(){let icons=['🎆','🎇','🎊','💖','🌈','🌸','✨','🧨'];for(let i=0;i<44;i++){let s=document.createElement('span');s.className='burst';s.textContent=icons[Math.random()*icons.length|0];s.style.left=Math.random()*100+'%';s.style.top=52+Math.random()*38+'%';s.style.animationDelay=Math.random()*.55+'s';document.body.appendChild(s);setTimeout(()=>s.remove(),2100)}}$('roll').onclick=roll;$('histBtn').onclick=hist;$('close').onclick=()=>$('histM').classList.add('hide');$('blessBtn').onclick=()=>{$('resM').classList.add('hide');$('bless').textContent='💖 🌸 亲爱的老婆coco，祝你好运像骰子一样滚滚而来。 ✨';$('blessM').classList.remove('hide');fire()};$('ok').onclick=()=>{setTimeout(()=>{$('blessM').classList.add('hide');locked=false;$('roll').disabled=false;$('roll').textContent='▶️ 开始投掷';state.textContent='✅ 可继续投掷'},200)};document.querySelectorAll('.styleBtn').forEach(b=>b.onclick=()=>{document.body.className=b.dataset.t;document.querySelectorAll('.styleBtn').forEach(x=>x.classList.toggle('on',x===b));draw()});addEventListener('devicemotion',e=>{let a=e.accelerationIncludingGravity||{},m=Math.abs(a.x||0)+Math.abs(a.y||0)+Math.abs(a.z||0),now=Date.now();if(m>28&&now-lastShake>1600){lastShake=now;roll()}});sync();resize()})();</script></body></html>
