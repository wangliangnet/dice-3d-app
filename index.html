<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>投骰子0.0.17</title><style>body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Microsoft YaHei',Arial,sans-serif;background:#eef2f7;color:#20242a}body.cartoon{background:#fff0bf;color:#5a3215}body.minimal{background:#eee;color:#111}.app{min-height:100vh;display:flex;flex-direction:column}.top{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:rgba(255,255,255,.75);border-bottom:1px solid #ddd}h1{margin:0;font-size:22px}.sub{font-size:12px;color:#666}.layout{flex:1;display:grid;grid-template-columns:300px 1fr}.panel{padding:14px;background:rgba(255,255,255,.88);border-right:1px solid #ddd}.field{margin:10px 0}.field label{display:block;font-size:13px;color:#666;margin-bottom:5px}select,input{width:100%;height:42px;border:1px solid #ccc;border-radius:12px;padding:0 10px;font-size:16px}.stage{position:relative;min-height:420px;background:radial-gradient(circle at 50% 25%,#fff,transparent 35%),#dde5ef;overflow:hidden}canvas{width:100%;height:100%;display:block}.primary,.ghost{border:0;border-radius:14px;padding:12px 14px;font-size:16px;cursor:pointer}.primary{width:100%;margin-top:10px;background:linear-gradient(135deg,#e84a6a,#ff7893);color:#fff;font-weight:800}.ghost{background:#333;color:white}.status{margin-top:12px;padding:12px;border-radius:14px;background:rgba(0,0,0,.06);line-height:1.5}.bar{position:absolute;left:14px;bottom:14px;background:rgba(0,0,0,.55);color:#fff;padding:9px 13px;border-radius:999px}.foot{text-align:center;font-size:12px;color:#666;padding:10px}.modal{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;padding:18px;z-index:10}.hide{display:none}.card{background:#fff;color:#222;width:min(520px,94vw);border-radius:22px;padding:22px;text-align:center;box-shadow:0 20px 70px #0008}.big{font-size:23px;font-weight:900;line-height:1.55}.bless{font-size:21px;font-weight:900;color:#d91d61;line-height:1.7}.hist{text-align:left;max-height:50vh;overflow:auto;line-height:1.8}.spark{position:fixed;font-size:25px;animation:f 1.6s ease-out forwards;z-index:11}@keyframes f{from{transform:translateY(30px) scale(.5);opacity:0}20%{opacity:1}to{transform:translateY(-95px) scale(1.6) rotate(260deg);opacity:0}}@media(max-width:820px){.layout{display:flex;flex-direction:column}.panel{border-right:0}.stage{height:58vh}.top{gap:8px;align-items:flex-start}h1{font-size:20px}}</style></head><body><div class="app"><header class="top"><div><h1>🎲 投骰子</h1><div class="sub">版本0.0.17 · 可分享网页发布版 · 2026年4月28日</div></div><button id="histTop" class="ghost">历史记录</button></header><main class="layout"><aside class="panel"><div class="field"><label>界面风格</label><select id="theme"><option value="std">标准</option><option value="cartoon">卡通</option><option value="minimal">极简</option></select></div><div class="field"><label>骰子数量 1-99</label><input id="count" type="number" min="1" max="99" step="1" value="3" list="nums"></div><div class="field"><label>投掷次数 1-99</label><input id="times" type="number" min="1" max="99" step="1" value="1" list="nums"></div><datalist id="nums"></datalist><button id="roll" class="primary">摇动手机或点击这里开始投掷</button><button id="hist" class="primary" style="background:#555">查看最近50次历史记录</button><div id="status" class="status">桌面端点击按钮；手机端也可以摇一摇投掷。</div></aside><section class="stage"><canvas id="cv"></canvas><div id="bar" class="bar">等待投掷</div></section></main><div class="foot">制作人：王亮 · 联系方式：wlnet@163.com</div></div><div id="resM" class="modal hide"><div class="card"><h2>🎯 投掷完成</h2><div id="res" class="big"></div><button id="blessBtn" class="primary">查看祝福</button></div></div><div id="blessM" class="modal hide"><div class="card"><div id="bless" class="bless"></div><button id="ok" class="primary">收到祝福，继续好运</button></div></div><div id="histM" class="modal hide"><div class="card"><h2>最近50次投掷结果</h2><div id="histList" class="hist"></div><button id="close" class="ghost">关闭</button></div></div><script>(function(){const cv=document.getElementById('cv'),x=cv.getContext('2d');let W,H,dice=[],rolling=false,locked=false,end=0,lastShake=0,cur=null;for(let i=1;i<100;i++){let o=document.createElement('option');o.value=i;nums.appendChild(o)}function cl(v){v=parseInt(v)||1;return Math.max(1,Math.min(99,v))}function size(){let r=cv.getBoundingClientRect(),d=Math.min(devicePixelRatio||1,1.7);W=r.width||innerWidth;H=r.height||420;cv.width=W*d;cv.height=H*d;x.setTransform(d,0,0,d,0,0);draw()}onresize=size;setTimeout(size,80);function make(n){dice=[];let cols=Math.ceil(Math.sqrt(n)),gap=Math.min(75,Math.max(32,W/(cols+1)));for(let i=0;i<n;i++){let c=i%cols,r=Math.floor(i/cols);dice.push({x:W/2+(c-(cols-1)/2)*gap,y:H*.34+r*gap*.62,s:Math.max(30,Math.min(58,68-n*.28)),vx:0,vy:0,rot:Math.random()*6,vr:0,val:1,b:0})}}function rr(a,b,c,d,r){x.beginPath();x.moveTo(a+r,b);x.lineTo(a+c-r,b);x.quadraticCurveTo(a+c,b,a+c,b+r);x.lineTo(a+c,b+d-r);x.quadraticCurveTo(a+c,b+d,a+c-r,b+d);x.lineTo(a+r,b+d);x.quadraticCurveTo(a,b+d,a,b+d-r);x.lineTo(a,b+r);x.quadraticCurveTo(a,b,a+r,b);x.closePath()}function pip(px,py,s){x.fillStyle='#0005';x.beginPath();x.arc(px+1,py+2,s*.075,0,7);x.fill();x.fillStyle='#111';x.beginPath();x.arc(px,py,s*.07,0,7);x.fill()}function pips(v,s){let a=s*.22,m={1:[[0,0]],2:[[-a,-a],[a,a]],3:[[-a,-a],[0,0],[a,a]],4:[[-a,-a],[a,-a],[-a,a],[a,a]],5:[[-a,-a],[a,-a],[0,0],[-a,a],[a,a]],6:[[-a,-a],[a,-a],[-a,0],[a,0],[-a,a],[a,a]]};m[v].forEach(p=>pip(p[0],p[1],s))}function one(d){let s=d.s;x.save();x.translate(d.x,d.y-d.b);x.rotate(d.rot);x.fillStyle='rgba(0,0,0,.22)';x.beginPath();x.ellipse(5,s*.62,s*.62,s*.18,0,0,7);x.fill();x.fillStyle='#fff';rr(-s/2,-s/2,s,s,s*.22);x.fill();let g=x.createLinearGradient(-s/2,-s/2,s/2,s/2);g.addColorStop(0,'#fff');g.addColorStop(.6,'#ffffff55');g.addColorStop(1,'#0002');x.fillStyle=g;rr(-s/2,-s/2,s,s,s*.22);x.fill();x.strokeStyle='#0003';x.lineWidth=2;rr(-s/2,-s/2,s,s,s*.22);x.stroke();pips(d.val,s);x.restore()}function draw(){if(!W)return;x.clearRect(0,0,W,H);let g=x.createRadialGradient(W*.45,H*.25,20,W*.5,H*.5,Math.max(W,H));g.addColorStop(0,'#fff');g.addColorStop(1,'#ffffff00');x.fillStyle=g;x.fillRect(0,0,W,H);dice.forEach(one)}function start(){if(rolling||locked)return;let n=cl(count.value),t=cl(times.value);count.value=n;times.value=t;make(n);rolling=true;locked=true;end=performance.now()+Math.min(5000,1700+n*20+t*7);status.textContent='骰子正在滚动，请等待结果……';bar.textContent='投掷中：'+n+'个骰子 × '+t+'次';dice.forEach(d=>{d.vx=(Math.random()-.5)*14;d.vy=(Math.random()-.5)*12;d.vr=(Math.random()-.5)*.7});cur={n,t,total:0};requestAnimationFrame(loop)}function loop(T){if(!rolling)return;let r=end-T;dice.forEach(d=>{d.x+=d.vx;d.y+=d.vy;d.vx*=.985;d.vy*=.985;d.rot+=d.vr;d.vr*=.988;d.b=Math.abs(Math.sin(T/90+d.x))*Math.min(22,Math.max(0,r)/70);if(d.x<d.s/2||d.x>W-d.s/2)d.vx*=-.82;if(d.y<d.s/2||d.y>H-d.s/2)d.vy*=-.82;d.x=Math.max(d.s/2,Math.min(W-d.s/2,d.x));d.y=Math.max(d.s/2,Math.min(H-d.s/2,d.y));if(Math.random()<.4)d.val=1+Math.floor(Math.random()*6)});draw();r>0?requestAnimationFrame(loop):finish()}function finish(){rolling=false;dice.forEach(d=>{d.b=0;d.val=1+Math.floor(Math.random()*6)});let oneSum=dice.reduce((a,d)=>a+d.val,0);cur.total=oneSum*cur.t;draw();bar.textContent='结果：'+cur.total+'点';status.textContent='投掷完成，请查看结果并确认祝福后再继续。';res.innerHTML=`骰子数量：${cur.n}<br>投掷次数：${cur.t}<br>本次总点数：${cur.total}`;save(cur);resM.classList.remove('hide')}function save(r){let a=JSON.parse(localStorage.diceHistory0017||'[]');a.unshift({time:new Date().toLocaleString(),n:r.n,t:r.t,total:r.total});localStorage.diceHistory0017=JSON.stringify(a.slice(0,50))}function history(){let a=JSON.parse(localStorage.diceHistory0017||'[]');histList.innerHTML=a.length?a.map((r,i)=>`<div>${i+1}. ${r.time}｜${r.n}个×${r.t}次｜${r.total}点</div>`).join(''):'暂无记录';histM.classList.remove('hide')}function fx(){let cs=['🎆','🎇','🎊','💖','🌈','🌸','✨','🧨'];for(let i=0;i<34;i++){let s=document.createElement('span');s.className='spark';s.textContent=cs[Math.random()*cs.length|0];s.style.left=Math.random()*100+'%';s.style.top=55+Math.random()*35+'%';s.style.animationDelay=Math.random()*.6+'s';document.body.appendChild(s);setTimeout(()=>s.remove(),1900)}}roll.onclick=start;hist.onclick=history;histTop.onclick=history;close.onclick=()=>histM.classList.add('hide');blessBtn.onclick=()=>{resM.classList.add('hide');let icons=['💖','🌸','💕','🌹','🎉','😊','🌈','✨','💗'],msgs=['亲爱的老婆coco，祝你每天都有开开心心的小惊喜。','亲爱的老婆coco，祝你好运像骰子一样滚滚而来。','亲爱的老婆coco，祝你心情像花一样盛开。','亲爱的老婆coco，祝你烦恼自动下线，快乐持续在线。','亲爱的老婆coco，祝你财运旺旺，笑容满分。'];let L=icons[Math.random()*icons.length|0]+' '+icons[Math.random()*icons.length|0],R=icons[Math.random()*icons.length|0]+' '+icons[Math.random()*icons.length|0];bless.textContent=L+' '+msgs[Math.random()*msgs.length|0]+' '+R;blessM.classList.remove('hide');fx()};ok.onclick=()=>setTimeout(()=>{blessM.classList.add('hide');locked=false;status.textContent='祝福已收到，可以开始下一次投掷。'},200);theme.onchange=e=>{document.body.className=e.target.value==='std'?'':e.target.value;draw()};addEventListener('devicemotion',e=>{let a=e.accelerationIncludingGravity||{},m=Math.abs(a.x||0)+Math.abs(a.y||0)+Math.abs(a.z||0),now=Date.now();if(m>28&&now-lastShake>1600){lastShake=now;start()}});make(3);size()})();</script></body></html>
