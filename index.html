<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>投骰子0.0.19</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Microsoft YaHei",Arial,sans-serif;background:linear-gradient(135deg,#f3f6fb,#e7eef8);color:#1f2937}body.cartoon{background:linear-gradient(135deg,#fff2bc,#ffdcec);color:#5b3416}body.minimal{background:#efefef;color:#111}.app{min-height:100vh;display:flex;flex-direction:column}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:14px 18px;background:rgba(255,255,255,.82);border-bottom:1px solid #dbe3ef;backdrop-filter:blur(10px)}h1{margin:0;font-size:24px}.sub{font-size:12px;color:#64748b}.layout{flex:1;display:grid;grid-template-columns:minmax(280px,320px) 1fr}.panel{padding:16px;background:rgba(255,255,255,.9);border-right:1px solid #dbe3ef}.field{margin:11px 0}.field label{display:block;font-size:13px;color:#64748b;margin-bottom:6px}select,input{width:100%;height:44px;border:1px solid #d6deea;border-radius:14px;padding:0 12px;font-size:16px;background:#fff}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.btn{border:0;border-radius:16px;padding:12px 14px;font-size:16px;cursor:pointer;transition:.12s}.btn:active{transform:scale(.98)}.primary{width:100%;margin-top:10px;color:#fff;font-weight:900;background:linear-gradient(135deg,#e84a6a,#ff7a9a)}.dark{background:#263142;color:white}.light{width:100%;background:#eef2f7;color:#1f2937;border:1px solid #dbe3ef}.hint{margin-top:12px;padding:12px;border-radius:16px;background:#fff4f6;border:1px solid #ffd0db;line-height:1.55}.hint b{color:#e84a6a}.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.stat{padding:10px;border-radius:14px;border:1px solid #dbe3ef;background:#fff}.stat small{display:block;color:#64748b}.stat strong{font-size:21px}.stage{position:relative;min-height:430px;background:radial-gradient(circle at 45% 20%,#fff,transparent 34%),linear-gradient(145deg,#fdfefe,#dfe8f5);overflow:hidden}canvas{width:100%;height:100%;display:block}.pillBox{position:absolute;left:14px;right:14px;bottom:14px;display:flex;justify-content:space-between;gap:10px;pointer-events:none}.pill{background:rgba(18,24,38,.72);color:#fff;border-radius:999px;padding:9px 13px;font-size:14px}.foot{text-align:center;padding:10px;color:#64748b;font-size:12px;background:rgba(255,255,255,.82);border-top:1px solid #dbe3ef}.modal{position:fixed;inset:0;background:rgba(0,0,0,.62);display:flex;align-items:center;justify-content:center;padding:18px;z-index:20}.hide{display:none!important}.card{width:min(540px,94vw);background:#fff;color:#1f2937;border-radius:24px;padding:24px;text-align:center}.big{font-size:23px;font-weight:900;line-height:1.65}.bless{font-size:21px;font-weight:900;color:#d91d61;line-height:1.8}.hist{text-align:left;max-height:52vh;overflow:auto;line-height:1.9;border:1px solid #e5e7eb;border-radius:16px;padding:10px;background:#fafafa}.histItem{border-bottom:1px dashed #ddd;padding:6px 0}.spark{position:fixed;font-size:25px;animation:fly 1.6s ease-out forwards;z-index:30}@keyframes fly{from{transform:translateY(26px) scale(.55);opacity:0}20%{opacity:1}to{transform:translateY(-95px) scale(1.55) rotate(240deg);opacity:0}}@media(max-width:840px){.layout{display:flex;flex-direction:column}.panel{border-right:0;border-bottom:1px solid #dbe3ef}.stage{height:56vh;min-height:360px}.top{align-items:flex-start}h1{font-size:21px}.row{grid-template-columns:1fr}.pillBox{bottom:10px;left:10px;right:10px}.pill{font-size:13px}}
</style>
</head>
<body>
<div class="app">
<header class="top"><div><h1>🎲 投骰子</h1><div class="sub">版本0.0.19 · 界面与交互优化版 · 2026年4月28日</div></div><button id="openHistoryTop" class="btn dark">历史记录</button></header>
<main class="layout"><aside class="panel"><b>投掷设置</b><div class="field"><label>界面风格</label><select id="themeSelect"><option value="standard">标准</option><option value="cartoon">卡通</option><option value="minimal">极简</option></select></div><div class="row"><div class="field"><label>骰子数量</label><input id="diceCount" type="number" min="1" max="99" step="1" value="3" list="numberList"></div><div class="field"><label>投掷次数</label><input id="rollTimes" type="number" min="1" max="99" step="1" value="1" list="numberList"></div></div><datalist id="numberList"></datalist><button id="rollButton" class="btn primary">摇动手机或点击这里开始投掷</button><button id="openHistoryPanel" class="btn light">查看最近50次历史记录</button><div id="guideText" class="hint"><b>操作提示：</b>选择数量后点击按钮，手机端也可以摇一摇。</div><div class="stats"><div class="stat"><small>当前骰子</small><strong id="statDice">3</strong></div><div class="stat"><small>投掷次数</small><strong id="statTimes">1</strong></div></div></aside><section class="stage"><canvas id="diceCanvas"></canvas><div class="pillBox"><span id="statePill" class="pill">等待投掷</span><span id="resultPill" class="pill">暂无结果</span></div></section></main><footer class="foot">制作人：王亮 · 联系方式：wlnet@163.com</footer>
</div>
<div id="resultModal" class="modal hide"><div class="card"><h2>🎯 投掷完成</h2><div id="resultText" class="big"></div><button id="showBlessingButton" class="btn primary">查看祝福</button></div></div>
<div id="blessingModal" class="modal hide"><div class="card"><div id="blessingText" class="bless"></div><button id="confirmBlessingButton" class="btn primary">收到祝福，继续好运</button></div></div>
<div id="historyModal" class="modal hide"><div class="card"><h2>最近50次投掷结果</h2><div id="historyList" class="hist"></div><button id="closeHistoryButton" class="btn dark" style="margin-top:14px">关闭</button></div></div>
<script>
(function(){'use strict';const $=id=>document.getElementById(id),c=$('diceCanvas'),x=c.getContext('2d'),K='diceHistory0019';let W=0,H=0,dice=[],rolling=false,locked=false,end=0,lastShake=0,cur=null,raf=0;const e={theme:$('themeSelect'),n:$('diceCount'),t:$('rollTimes'),roll:$('rollButton'),guide:$('guideText'),state:$('statePill'),result:$('resultPill'),sd:$('statDice'),st:$('statTimes'),rm:$('resultModal'),rt:$('resultText'),blessBtn:$('showBlessingButton'),bm:$('blessingModal'),bt:$('blessingText'),ok:$('confirmBlessingButton'),hm:$('historyModal'),hl:$('historyList'),hc:$('closeHistoryButton'),ht:$('openHistoryTop'),hp:$('openHistoryPanel'),nl:$('numberList')};for(let i=1;i<=99;i++){let o=document.createElement('option');o.value=i;e.nl.appendChild(o)}function clamp(v){v=parseInt(v,10);return Number.isFinite(v)?Math.max(1,Math.min(99,v)):1}function sync(){e.n.value=clamp(e.n.value);e.t.value=clamp(e.t.value);e.sd.textContent=e.n.value;e.st.textContent=e.t.value}e.n.oninput=()=>e.sd.textContent=clamp(e.n.value);e.t.oninput=()=>e.st.textContent=clamp(e.t.value);e.n.onchange=sync;e.t.onchange=sync;function size(){let r=c.getBoundingClientRect(),d=Math.min(devicePixelRatio||1,1.75);W=Math.max(300,r.width||innerWidth);H=Math.max(300,r.height||420);c.width=W*d;c.height=H*d;x.setTransform(d,0,0,d,0,0);if(!rolling)draw()}onresize=size;function make(n){dice=[];let cols=Math.ceil(Math.sqrt(n)),gap=Math.min(76,Math.max(34,W/(cols+1))),sy=Math.max(70,H*.24);for(let i=0;i<n;i++){let col=i%cols,row=Math.floor(i/cols);dice.push({x:W/2+(col-(cols-1)/2)*gap,y:sy+row*gap*.66,s:Math.max(28,Math.min(58,70-n*.30)),vx:0,vy:0,rot:Math.random()*6.28,vr:0,val:1,lift:0,tilt:0})}}function rr(a,b,w,h,r){x.beginPath();x.moveTo(a+r,b);x.lineTo(a+w-r,b);x.quadraticCurveTo(a+w,b,a+w,b+r);x.lineTo(a+w,b+h-r);x.quadraticCurveTo(a+w,b+h,a+w-r,b+h);x.lineTo(a+r,b+h);x.quadraticCurveTo(a,b+h,a,b+h-r);x.lineTo(a,b+r);x.quadraticCurveTo(a,b,a+r,b);x.closePath()}function pip(px,py,s){x.fillStyle='#111';x.beginPath();x.arc(px,py,s*.072,0,7);x.fill();x.fillStyle='rgba(255,255,255,.26)';x.beginPath();x.arc(px-s*.018,py-s*.018,s*.024,0,7);x.fill()}function pips(v,s){let a=s*.22,m={1:[[0,0]],2:[[-a,-a],[a,a]],3:[[-a,-a],[0,0],[a,a]],4:[[-a,-a],[a,-a],[-a,a],[a,a]],5:[[-a,-a],[a,-a],[0,0],[-a,a],[a,a]],6:[[-a,-a],[a,-a],[-a,0],[a,0],[-a,a],[a,a]]};m[v].forEach(p=>pip(p[0],p[1],s))}function die(d){let s=d.s;x.save();x.translate(d.x,d.y-d.lift);x.rotate(d.rot);x.transform(1,d.tilt*.045,d.tilt*.025,1,0,0);rr(-s/2,-s/2,s,s,s*.25);x.fillStyle='#fff';x.fill();let g=x.createLinearGradient(-s/2,-s/2,s/2,s/2);g.addColorStop(0,'#fff');g.addColorStop(.46,'#fbfcff');g.addColorStop(1,'#ccd4df');x.fillStyle=g;x.fill();let h=x.createRadialGradient(-s*.2,-s*.25,s*.04,-s*.2,-s*.25,s*.68);h.addColorStop(0,'rgba(255,255,255,.78)');h.addColorStop(.55,'rgba(255,255,255,.20)');h.addColorStop(1,'rgba(255,255,255,0)');x.fillStyle=h;rr(-s/2,-s/2,s,s,s*.25);x.fill();x.strokeStyle='rgba(80,90,110,.42)';x.lineWidth=2;rr(-s/2,-s/2,s,s,s*.25);x.stroke();x.strokeStyle='rgba(255,255,255,.46)';x.lineWidth=1;rr(-s/2+3,-s/2+3,s-6,s-6,s*.18);x.stroke();pips(d.val,s);x.restore()}function draw(){x.clearRect(0,0,W,H);let bg=x.createRadialGradient(W*.45,H*.2,20,W*.5,H*.5,Math.max(W,H));bg.addColorStop(0,'rgba(255,255,255,.82)');bg.addColorStop(1,'rgba(255,255,255,0)');x.fillStyle=bg;x.fillRect(0,0,W,H);dice.forEach(die)}function guide(t,b){e.guide.innerHTML='<b>'+b+'：</b>'+t}function start(){if(rolling||locked)return;sync();let n=clamp(e.n.value),t=clamp(e.t.value);make(n);rolling=true;locked=true;cur={n,t,total:0};end=performance.now()+Math.min(5000,1800+n*18+t*8);e.roll.disabled=true;e.roll.style.opacity=.72;e.state.textContent='投掷中';e.result.textContent=n+'个 × '+t+'次';guide('骰子正在滚动，请等待结果弹窗出现。','投掷中');dice.forEach(d=>{d.vx=(Math.random()-.5)*16;d.vy=(Math.random()-.5)*13;d.vr=(Math.random()-.5)*.92;d.tilt=(Math.random()-.5)*1.8});cancelAnimationFrame(raf);raf=requestAnimationFrame(loop)}function loop(now){let r=end-now;dice.forEach(d=>{d.x+=d.vx;d.y+=d.vy;d.vx*=.983;d.vy*=.983;d.rot+=d.vr;d.vr*=.987;d.lift=Math.abs(Math.sin(now/78+d.x*.018))*Math.min(24,Math.max(0,r)/65);d.tilt=Math.sin(now/128+d.y*.012)*Math.min(1.18,Math.max(0,r)/900);if(d.x<d.s/2||d.x>W-d.s/2)d.vx*=-.84;if(d.y<d.s/2||d.y>H-d.s/2)d.vy*=-.84;d.x=Math.max(d.s/2,Math.min(W-d.s/2,d.x));d.y=Math.max(d.s/2,Math.min(H-d.s/2,d.y));if(Math.random()<.42)d.val=1+Math.floor(Math.random()*6)});draw();r>0?raf=requestAnimationFrame(loop):finish()}function finish(){rolling=false;dice.forEach(d=>{d.lift=0;d.tilt=0;d.val=1+Math.floor(Math.random()*6)});cur.total=dice.reduce((a,d)=>a+d.val,0)*cur.t;draw();e.state.textContent='投掷完成';e.result.textContent=cur.total+'点';e.rt.innerHTML='骰子数量：'+cur.n+'<br>投掷次数：'+cur.t+'<br>本次总点数：'+cur.total;save(cur);guide('请先查看祝福并点击确认，然后才能开始下一次投掷。','下一步');e.rm.classList.remove('hide')}function save(r){let a=JSON.parse(localStorage.getItem(K)||'[]');a.unshift({time:new Date().toLocaleString(),n:r.n,t:r.t,total:r.total});localStorage.setItem(K,JSON.stringify(a.slice(0,50)))}function history(){let a=JSON.parse(localStorage.getItem(K)||'[]');e.hl.innerHTML=a.length?a.map((r,i)=>'<div class="histItem">'+(i+1)+'. '+r.time+'｜'+r.n+'个 × '+r.t+'次｜'+r.total+'点</div>').join(''):'暂无历史记录';e.hm.classList.remove('hide')}function closeHistory(){e.hm.classList.add('hide')}function fx(){let cs=['🎆','🎇','🎊','💖','🌈','🌸','✨','🧨'];for(let i=0;i<34;i++){let s=document.createElement('span');s.className='spark';s.textContent=cs[Math.floor(Math.random()*cs.length)];s.style.left=Math.random()*100+'%';s.style.top=55+Math.random()*35+'%';s.style.animationDelay=Math.random()*.6+'s';document.body.appendChild(s);setTimeout(()=>s.remove(),1900)}}function blessing(){e.rm.classList.add('hide');let icons=['💖','🌸','💕','🌹','🎉','😊','🌈','✨','💗'],msgs=['亲爱的老婆coco，祝你每天都有开开心心的小惊喜。','亲爱的老婆coco，祝你好运像骰子一样滚滚而来。','亲爱的老婆coco，祝你心情像花一样盛开。','亲爱的老婆coco，祝你烦恼自动下线，快乐持续在线。','亲爱的老婆coco，祝你财运旺旺，笑容满分。','亲爱的老婆coco，祝你想吃的都有，想买的都划算。'];let p=()=>icons[Math.floor(Math.random()*icons.length)];e.bt.textContent=p()+' '+p()+' '+msgs[Math.floor(Math.random()*msgs.length)]+' '+p();e.bm.classList.remove('hide');fx()}function ok(){setTimeout(()=>{e.bm.classList.add('hide');locked=false;e.roll.disabled=false;e.roll.style.opacity=1;e.state.textContent='可继续投掷';guide('可以调整数量，或直接开始下一次投掷。','准备好了')},200)}e.roll.addEventListener('click',start);e.ht.addEventListener('click',history);e.hp.addEventListener('click',history);e.hc.addEventListener('click',closeHistory);e.hm.addEventListener('click',ev=>{if(ev.target===e.hm)closeHistory()});e.blessBtn.addEventListener('click',blessing);e.ok.addEventListener('click',ok);e.theme.addEventListener('change',()=>{let v=e.theme.value;document.body.className=v==='standard'?'':v;draw()});addEventListener('devicemotion',ev=>{let a=ev.accelerationIncludingGravity||{},m=Math.abs(a.x||0)+Math.abs(a.y||0)+Math.abs(a.z||0),now=Date.now();if(m>28&&now-lastShake>1600){lastShake=now;start()}});make(3);sync();size();guide('选择骰子数量和投掷次数后，点击按钮即可投掷；手机端也可以摇一摇。','操作提示')})();
</script>
</body>
